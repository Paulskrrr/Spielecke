<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" role="img" aria-label="Pauls Spielecke">
  <title>Pauls Spielecke</title>
  <defs>
    <!-- The chunky wordmark. Uses the app's rounded font stack; falls back to
         a bold sans on devices without Baloo/Comic Sans/Chalkboard. -->
    <text id="wm" x="330" y="222" text-anchor="middle"
      font-family="'Baloo 2','Comic Sans MS','Chalkboard SE','Comic Neue','Trebuchet MS',sans-serif"
      font-size="150" font-weight="800" letter-spacing="-2">Spielecke</text>
  </defs>

  <!-- "Spielecke": black-outlined, 3D-extruded gold, tilted up to the right -->
  <g transform="rotate(-5 330 185)">
    <!-- bottom of the extrude carries the black contour -->
    <use href="#wm" transform="translate(9,11)" fill="#b07d18"
         stroke="#141414" stroke-width="24" stroke-linejoin="round" paint-order="stroke"/>
    <use href="#wm" transform="translate(7,9)"  fill="#c2871a"/>
    <use href="#wm" transform="translate(5,6)"  fill="#d2961d"/>
    <use href="#wm" transform="translate(3,4)"  fill="#e3a821"/>
    <use href="#wm" transform="translate(1,2)"  fill="#f2b827"/>
    <!-- bright top face with its own black outline -->
    <use href="#wm" fill="#ffc92e"
         stroke="#141414" stroke-width="15" stroke-linejoin="round" paint-order="stroke"/>
  </g>

  <!-- "Pauls": red marker script sitting on top, overlapping the S -->
  <text x="300" y="118" text-anchor="middle" transform="rotate(-8 300 100)"
    font-family="'Bradley Hand','Brush Script MT','Segoe Script','Comic Sans MS',cursive"
    font-size="118" font-weight="700" font-style="italic"
    fill="#e42818" stroke="#c01d10" stroke-width="1.5" paint-order="stroke">Pauls</text>
</svg>
